# SASRec config for the demo MovieLens-small dataset.
# Used for training (flaskr.tools.train_sasrec) and online inference (flaskr.tools.sasrec_tool).

# Atomic-file fields (RecBole format)
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
RATING_FIELD: rating
TIME_FIELD: timestamp

# Data filtering — keep users/items with enough interactions for sequential modelling
load_col:
  inter: [user_id, item_id, rating, timestamp]
user_inter_num_interval: "[5,inf)"
item_inter_num_interval: "[5,inf)"

# Sequential model parameters (mirrors Lab3 Configuration/SASRec.yaml, tuned slightly for the smaller demo set)
MAX_ITEM_LIST_LENGTH: 50
n_layers: 2
n_heads: 2
hidden_size: 64
inner_size: 256
hidden_dropout_prob: 0.5
attn_dropout_prob: 0.5
hidden_act: 'gelu'
layer_norm_eps: 1e-12
initializer_range: 0.02
loss_type: 'CE'
train_neg_sample_args: ~

# Training
epochs: 30
train_batch_size: 1024
eval_batch_size: 2048
learning_rate: 0.001
stopping_step: 5
checkpoint_dir: 'flaskr/static/ml_data/sasrec/saved'

# Evaluation
metrics: [Precision, Recall, NDCG, Hit, MRR]
topk: [10, 12, 20]
valid_metric: NDCG@10
valid_metric_bigger: true
eval_args:
  split: { RS: [0.8, 0.1, 0.1] }
  group_by: user
  order: TO
  mode:
    valid: full
    test: full

# Misc
seed: 42
reproducibility: true
data_path: 'flaskr/static/ml_data/sasrec/data'
show_progress: true
