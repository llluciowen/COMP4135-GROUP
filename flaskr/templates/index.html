<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Movie Recommender System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">
    <template v-if="isLoading">
        <section class="hero is-fullheight">
            <div class="hero-body">
                <div class="">
                    <p class="title">
                        Loading...
                    </p>
                </div>
            </div>
        </section>
    </template>
    <template v-else>
        <div class="container">
            <nav :class="['navbar', 'is-active']" role="navigation" aria-label="main navigation">
                <div class="navbar-brand">
                    <a class="navbar-item" href="/">
                        <span class="is-size-3">Movies Recommender System</span>
                    </a>

                    <a role="button" :class="['navbar-burger', isActivityNavBar ? 'is-active' : '']" aria-label="menu"
                       aria-expanded="false"
                       data-target="navbarBasicExample" @click="isActivityNavBar = !isActivityNavBar">
                        <span aria-hidden="true"></span>
                        <span aria-hidden="true"></span>
                        <span aria-hidden="true"></span>
                    </a>
                </div>

                <div id="navbarBasicExample" :class="['navbar-menu', isActivityNavBar ? 'is-active' : '']">
                    <div class="navbar-start">
                        <div class="navbar-item">
                            <span class="tag is-info is-light mr-2">UI {{ ui_variant }}</span>
                            <span class="tag is-success is-light">Algo {{ algo_variant }}</span>
                        </div>
                    </div>
                    <div class="navbar-end">
                        <div class="navbar-item">
                            <div class="buttons">
                                <button class="button is-danger" @click="cleanAll">
                                    <strong>Clean All</strong>
                                </button>

                                <button class="button is-link" @click="showGenres = true">
                                    <strong>Genres</strong>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>
        </div>

        <section class="section pt-2 pb-0">
            <div class="container">
                <div :class="['notification', uiVariant === 'B' ? 'is-info is-light' : 'is-light']">
                    <p class="mb-2"><strong>Experiment Assignment</strong>: {{ ui_variant_label }} x {{ algo_variant_label }}</p>
                    <p class="mb-2">Please rate at least [[ ratingThreshold ]] movies to unlock recommendation sections.</p>
                    <div class="buttons are-small has-addons mt-2">
                        <a class="button" href="/?ui_variant=A&algo_variant=A">A/A</a>
                        <a class="button" href="/?ui_variant=A&algo_variant=B">A/B</a>
                        <a class="button" href="/?ui_variant=B&algo_variant=A">B/A</a>
                        <a class="button" href="/?ui_variant=B&algo_variant=B">B/B</a>
                    </div>
                </div>
            </div>
        </section>

        <template v-if="uiVariant === 'B' && genres.length > 0">
            <section class="section pt-2 pb-0">
                <div class="container">
                    <div class="box">
                        <p class="mb-2"><strong>Onboarding Progress</strong></p>
                        <progress class="progress is-primary" :value="Math.min(userRates.length, ratingThreshold)"
                                  :max="ratingThreshold">[[ userRates.length ]]</progress>
                        <p class="is-size-7">
                            Ratings: [[ userRates.length ]] / [[ ratingThreshold ]]
                        </p>
                    </div>
                </div>
            </section>
        </template>

        <template v-if="genres.length > 0 && userRates.length >= ratingThreshold">
            <template v-if="uiVariant !== 'B'">
                {% if recommendations %}
                <section class="section pt-2 pb-0">
                    <div class="container">
                        <p class="is-size-4">
                            Recommended
                        </p>
                        <p class="mb-3">{{ recommendations_message }}</p>

                        <div class="columns is-mobile is-multiline">
                            {% for movie in recommendations %}
                            <div class="column is-3-fullhd is-3-desktop is-3-tablet is-6-mobile">
                                <div class="card">
                                    <div class="card-image">
                                        <figure class="image is-4by3">
                                            <img src="{{ movie['cover_url'] }}"
                                                 onerror="this.src='https://placehold.co/480x640?text=No+Cover';"
                                                 alt="">
                                        </figure>
                                    </div>
                                    <div class="card-content p-2">
                                        <div class="media">
                                            <div class="media-content">
                                                <p style="font-size: 0.8rem; font-weight: bold">{{ movie['title']
                                                    }}</p>
                                                <p style="font-size: 0.8rem">{{ movie['release_date'] }}</p>
                                                {% if 'score' in movie %}
                                                <p style="font-size: 0.75rem">Predicted score: {{ "%.2f"|format(movie['score']) }}</p>
                                                {% endif %}
                                            </div>
                                        </div>
                                    </div>

                                    <div class="card-footer p-2">
                                        <button class="button is-small" @click="updateLike({{movie['movieId']}})">
                                            <span :class="['fa fa-thumbs-up', inLikes({{movie['movieId']}}) ? 'checked': '']" > Like</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </section>
                {% endif %}

                {% if likes_similars %}
                <section class="section pb-0">
                    <div class="container">
                        <p class="is-size-4">
                            Liked with Similar Items
                        </p>
                        <p class="mb-3">{{ likes_similar_message }}</p>

                        <div class="columns is-mobile is-multiline">
                            {% for movie in likes_similars %}
                            <div class="column is-2-fullhd is-2-desktop is-2-tablet is-6-mobile">
                                <div class="card">
                                    <div class="card-image">
                                        <figure class="image is-3by4">
                                            <img src="{{ movie['cover_url'] }}"
                                                 onerror="this.src='https://placehold.co/480x640?text=No+Cover';"
                                                 alt="">
                                        </figure>
                                    </div>
                                    <div class="card-content p-2">
                                        <div class="media">
                                            <div class="media-content">
                                                <p style="font-size: 0.8rem; font-weight: bold">{{ movie['title']
                                                    }}</p>
                                                <p style="font-size: 0.8rem">{{ movie['release_date'] }}</p>
                                                {% if 'similarity' in movie %}
                                                <p style="font-size: 0.75rem">Similarity: {{ "%.3f"|format(movie['similarity']) }}</p>
                                                {% endif %}
                                            </div>
                                        </div>
                                    </div>

                                    <div class="card-footer p-2">
                                        <button class="button is-small" @click="updateLike({{movie['movieId']}})">
                                            <span :class="['fa fa-thumbs-up', inLikes({{movie['movieId']}}) ? 'checked': '']" > Like</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </section>
                {% endif %}

                {% if likes %}
                <section class="section pb-0">
                    <div class="container">
                        <p class="is-size-4 mb-3">
                            Liked <button class="button" @click="reloadPage"><i class="fa fa-refresh mr-3" aria-hidden="true"></i>Refresh</button>
                        </p>

                        <div class="columns is-mobile pb-3" style="overflow: scroll">
                            {% for movie in likes %}
                            <div class="column is-2-fullhd is-2-desktop is-2-tablet is-6-mobile">
                                <div class="card">
                                    <div class="card-image">
                                        <figure class="image is-3by4">
                                            <img src="{{ movie['cover_url'] }}"
                                                 onerror="this.src='https://placehold.co/480x640?text=No+Cover';"
                                                 alt="">
                                        </figure>
                                    </div>
                                    <div class="card-content p-2">
                                        <div class="media">
                                            <div class="media-content">
                                                <p style="font-size: 0.8rem; font-weight: bold">{{ movie['title']
                                                    }}</p>
                                                <p style="font-size: 0.8rem">{{ movie['release_date'] }}</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="card-footer p-2">
                                        <button class="button is-small" @click="updateLike({{movie['movieId']}})">
                                            <span :class="['fa fa-thumbs-up', inLikes({{movie['movieId']}}) ? 'checked': '']" > Like</span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                    </div>
                </section>
                {% endif %}
            </template>

            <template v-else>
                <div class="ui-b-shell">
                <section class="section ui-b-section ui-b-section-intro">
                    <div class="container">
                        <div class="columns is-multiline">
                            <div class="column is-6" v-for="(card, idx) in explainCards" :key="'explain-' + idx">
                                <div class="ui-b-explanation">
                                    <div class="ui-b-explanation-header">
                                        <p><span class="icon mr-2"><i class="fa fa-lightbulb-o"></i></span> [[ card.title ]]</p>
                                    </div>
                                    <div class="ui-b-explanation-body">
                                        [[ card.body ]]
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="section ui-b-section ui-b-section-toolbar">
                    <div class="container">
                        <div class="ui-b-toolbar">
                            <div class="columns is-multiline is-variable is-4">
                                <div class="column is-4-desktop is-12-mobile">
                                    <label class="label ui-b-label"><i class="fa fa-search mr-2"></i>Search Title</label>
                                    <div class="control has-icons-left">
                                        <input class="input ui-b-input" type="text"
                                               v-model.trim="globalSearch"
                                               @change="onFilterChanged('search', globalSearch)"
                                               placeholder="Search in all panels...">
                                        <span class="icon is-left"><i class="fa fa-search"></i></span>
                                    </div>
                                </div>

                                <div class="column is-2-desktop is-6-mobile">
                                    <label class="label ui-b-label"><i class="fa fa-calendar mr-2"></i>Min Year</label>
                                    <input class="input ui-b-input" type="number" min="1900" max="2100"
                                           v-model.number="minYearFilter"
                                           @change="onFilterChanged('min_year', minYearFilter)">
                                </div>

                                <div class="column is-2-desktop is-6-mobile">
                                    <label class="label ui-b-label"><i class="fa fa-star-o mr-2"></i>Min Score</label>
                                    <input class="slider-control" type="range" min="0" max="5" step="0.1"
                                           v-model.number="minScoreFilter"
                                           @change="onFilterChanged('min_score', minScoreFilter)">
                                    <p class="ui-b-range-val">[[ minScoreFilter.toFixed(1) ]]</p>
                                </div>

                                <div class="column is-2-desktop is-6-mobile">
                                    <label class="label ui-b-label"><i class="fa fa-link mr-2"></i>Min Similarity</label>
                                    <input class="slider-control" type="range" min="0" max="1" step="0.01"
                                           v-model.number="minSimilarityFilter"
                                           @change="onFilterChanged('min_similarity', minSimilarityFilter)">
                                    <p class="ui-b-range-val">[[ minSimilarityFilter.toFixed(2) ]]</p>
                                </div>

                                <div class="column is-2-desktop is-12-mobile is-flex is-align-items-flex-end">
                                    <button class="button ui-b-btn is-fullwidth" @click="resetFilters">
                                        <span class="icon"><i class="fa fa-undo"></i></span>
                                        <span>Reset</span>
                                    </button>
                                </div>
                            </div>
                            
                            <div class="ui-b-toolbar-footer">
                                <div class="tags">
                                    <span class="tag ui-b-tag"><i class="fa fa-magic mr-2"></i> [[ sortedRecommendationItems.length ]] Recommended</span>
                                    <span class="tag ui-b-tag"><i class="fa fa-sitemap mr-2"></i> [[ sortedSimilarItems.length ]] Similar</span>
                                    <span class="tag ui-b-tag"><i class="fa fa-heart-o mr-2"></i> [[ sortedLikedItems.length ]] Liked</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="section ui-b-section ui-b-section-tabs">
                    <div class="container">
                        <div class="tabs ui-b-tabs is-centered mb-0">
                            <ul>
                                <li :class="activeTab === 'recommendations' ? 'is-active' : ''">
                                    <a @click="activeTab = 'recommendations'">
                                        <span class="icon is-small"><i class="fa fa-magic"></i></span>
                                        <span>Recommended</span>
                                    </a>
                                </li>
                                <li :class="activeTab === 'similar' ? 'is-active' : ''">
                                    <a @click="activeTab = 'similar'">
                                        <span class="icon is-small"><i class="fa fa-sitemap"></i></span>
                                        <span>Similar</span>
                                    </a>
                                </li>
                                <li :class="activeTab === 'liked' ? 'is-active' : ''">
                                    <a @click="activeTab = 'liked'">
                                        <span class="icon is-small"><i class="fa fa-heart-o"></i></span>
                                        <span>Liked</span>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </section>

                <section class="section ui-b-section ui-b-section-panel" v-show="activeTab === 'recommendations'">
                    <div class="container">
                        <div class="level ui-b-panel-head">
                            <div class="level-left">
                                <p class="ui-b-section-title"><i class="fa fa-magic"></i><span>Recommended</span></p>
                            </div>
                            <div class="level-right">
                                <div class="field has-addons">
                                    <div class="control">
                                        <div class="select is-small ui-b-select">
                                            <select v-model="recommendationSort" @change="onSortChanged('recommendations', recommendationSort)">
                                                <option value="score_desc">Score: High to Low</option>
                                                <option value="score_asc">Score: Low to High</option>
                                                <option value="year_desc">Year: Newest First</option>
                                                <option value="title_asc">Title: A-Z</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div class="control">
                                        <button class="button is-small ui-b-btn ui-b-refresh-btn" :class="isRefreshing ? 'is-loading' : ''" @click="refreshRecommendations">
                                            <span class="icon is-small"><i class="fa fa-refresh"></i></span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <p class="ui-b-panel-note">[[ recommendationMessage ]]</p>
                        <p class="ui-b-panel-meta">Showing [[ sortedRecommendationItems.length ]] items</p>
                        <p v-if="isRefreshing" class="ui-b-panel-meta">Refreshing...</p>
                        <div class="columns is-mobile is-multiline" v-if="sortedRecommendationItems.length > 0">
                            <div class="column is-3-fullhd is-3-desktop is-3-tablet is-6-mobile" v-for="movie in sortedRecommendationItems" :key="'rec-' + movie.movieId">
                                <div class="card ui-b-card">
                                    <div class="card-image ui-b-card-image">
                                        <figure class="image is-4by3">
                                            <img :src="movie.cover_url"
                                                 @error="onImageError"
                                                 alt="">
                                        </figure>
                                    </div>
                                    <div class="card-content">
                                        <div class="media">
                                            <div class="media-content">
                                                <p class="has-text-weight-normal is-size-6 mb-1">[[ movie.title ]]</p>
                                                <p class="has-text-grey is-size-7 mb-2">[[ resolveDisplayDate(movie) ]]</p>
                                                <div class="tags are-small mb-0">
                                                    <span class="tag ui-b-tag" v-for="genre in previewGenres(movie)" :key="'rec-genre-' + movie.movieId + '-' + genre">[[ genre ]]</span>
                                                </div>
                                                <div class="ui-b-card-reason">
                                                    <p class="mb-1" v-if="movie.score !== undefined && movie.score !== null">
                                                        <i class="fa fa-star-o mr-1"></i> [[ Number(movie.score).toFixed(2) ]]
                                                    </p>
                                                    <p>[[ cardReason(movie, 'recommendations') ]]</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="ui-b-card-footer">
                                        <button class="button ui-b-btn is-fullwidth" :class="inLikes(movie.movieId) ? 'is-active-like' : ''" @click="updateLike(movie.movieId)">
                                            <span class="icon is-small"><i :class="inLikes(movie.movieId) ? 'fa fa-heart' : 'fa fa-heart-o'"></i></span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="notification ui-b-notification" v-else>
                            No recommendation matches current filters. Try lowering min score/year.
                        </div>
                    </div>
                </section>

                <section class="section ui-b-section ui-b-section-panel" v-show="activeTab === 'similar'">
                    <div class="container">
                        <div class="level ui-b-panel-head">
                            <div class="level-left">
                                <p class="ui-b-section-title"><i class="fa fa-sitemap"></i><span>Liked With Similar</span></p>
                            </div>
                            <div class="level-right">
                                <div class="select is-small ui-b-select">
                                    <select v-model="similarSort" @change="onSortChanged('similar', similarSort)">
                                        <option value="similarity_desc">Similarity: High to Low</option>
                                        <option value="similarity_asc">Similarity: Low to High</option>
                                        <option value="year_desc">Year: Newest First</option>
                                        <option value="title_asc">Title: A-Z</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <p class="ui-b-panel-note">[[ similarMessage ]]</p>
                        <p class="ui-b-panel-meta">Showing [[ sortedSimilarItems.length ]] items</p>
                        <div class="columns is-mobile is-multiline" v-if="sortedSimilarItems.length > 0">
                            <div class="column is-2-fullhd is-2-desktop is-2-tablet is-6-mobile" v-for="movie in sortedSimilarItems" :key="'sim-' + movie.movieId">
                                <div class="card ui-b-card">
                                    <div class="card-image ui-b-card-image">
                                        <figure class="image is-3by4">
                                            <img :src="movie.cover_url"
                                                 @error="onImageError"
                                                 alt="">
                                        </figure>
                                    </div>
                                    <div class="card-content">
                                        <div class="media">
                                            <div class="media-content">
                                                <p class="has-text-weight-normal is-size-6 mb-1">[[ movie.title ]]</p>
                                                <p class="has-text-grey is-size-7 mb-2">[[ resolveDisplayDate(movie) ]]</p>
                                                <div class="tags are-small mb-0">
                                                    <span class="tag ui-b-tag" v-for="genre in previewGenres(movie)" :key="'sim-genre-' + movie.movieId + '-' + genre">[[ genre ]]</span>
                                                </div>
                                                <div class="ui-b-card-reason">
                                                    <p class="mb-1" v-if="movie.similarity !== undefined && movie.similarity !== null">
                                                        <i class="fa fa-link mr-1"></i> [[ Number(movie.similarity).toFixed(3) ]]
                                                    </p>
                                                    <p>[[ cardReason(movie, 'similar') ]]</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="ui-b-card-footer">
                                        <button class="button ui-b-btn is-fullwidth" :class="inLikes(movie.movieId) ? 'is-active-like' : ''" @click="updateLike(movie.movieId)">
                                            <span class="icon is-small"><i :class="inLikes(movie.movieId) ? 'fa fa-heart' : 'fa fa-heart-o'"></i></span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="notification ui-b-notification" v-else>
                            No similar-item result matches current filters.
                        </div>
                    </div>
                </section>

                <section class="section ui-b-section ui-b-section-panel ui-b-section-last" v-show="activeTab === 'liked'">
                    <div class="container">
                        <div class="level ui-b-panel-head">
                            <div class="level-left">
                                <p class="ui-b-section-title"><i class="fa fa-heart-o"></i><span>Liked</span></p>
                            </div>
                            <div class="level-right">
                                <div class="select is-small ui-b-select">
                                    <select v-model="likedSort" @change="onSortChanged('liked', likedSort)">
                                        <option value="liked_order">Liked Order</option>
                                        <option value="year_desc">Year: Newest First</option>
                                        <option value="title_asc">Title: A-Z</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <p class="ui-b-panel-meta">Showing [[ sortedLikedItems.length ]] items</p>
                        <div class="columns is-mobile is-multiline" v-if="sortedLikedItems.length > 0">
                            <div class="column is-2-fullhd is-2-desktop is-2-tablet is-6-mobile" v-for="movie in sortedLikedItems" :key="'liked-' + movie.movieId">
                                <div class="card ui-b-card">
                                    <div class="card-image ui-b-card-image">
                                        <figure class="image is-3by4">
                                            <img :src="movie.cover_url"
                                                 @error="onImageError"
                                                 alt="">
                                        </figure>
                                    </div>
                                    <div class="card-content">
                                        <div class="media">
                                            <div class="media-content">
                                                <p class="has-text-weight-normal is-size-6 mb-1">[[ movie.title ]]</p>
                                                <p class="has-text-grey is-size-7 mb-2">[[ resolveDisplayDate(movie) ]]</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="ui-b-card-footer">
                                        <button class="button ui-b-btn is-fullwidth" :class="inLikes(movie.movieId) ? 'is-active-like' : ''" @click="updateLike(movie.movieId)">
                                            <span class="icon is-small"><i :class="inLikes(movie.movieId) ? 'fa fa-heart' : 'fa fa-heart-o'"></i></span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="notification ui-b-notification" v-else>
                            No liked movies match your filters.
                        </div>
                    </div>
                </section>
                </div>
            </template>
        </template>

        <div :class="['modal', showGenres ? 'is-active' : '']">
            <div class="modal-background"></div>
            <div class="modal-card">
                <header class="modal-card-head">
                    <p class="modal-card-title">Please choose any genre you're interested in.</p>
                </header>
                <div class="modal-card-body">
                    <p class="mb-3">Multiple answers are possible.</p>
                    {% for gener in genres %}
                    <button :class="['button m-2', inGenres({{gener['id']}}) ? 'is-link' : '' ]" value="{{gener['id']}}"
                            @click="updateGenre({{gener['id']}})">
                        {{gener['name']}}
                    </button>
                    {% endfor %}
                </div>
                <footer class="modal-card-foot">
                    <button class="button is-link" :disabled="genres.length == 0" @click="saveGenres">Save
                    </button>
                </footer>
            </div>
        </div>

        <div :class="['modal', showMovieRate ? 'is-active' : '']">
            <div class="modal-background"></div>
            <div class="modal-card" style="max-width: 1000px">
                <header class="modal-card-head">
                    <p class="modal-card-title">Please rate at least [[ ratingThreshold ]] movies.</p>
                </header>
                <div class="modal-card-body">
                    <div class="columns is-mobile is-multiline">
                        <div class="column is-3-fullhd is-3-desktop is-3-tablet is-6-mobile" v-for="movie in defaultGenreMovies" :key="'rate-' + movie.movieId">
                            <div class="card">
                                <div class="card-image">
                                    <figure class="image is-3by4">
                                        <img :src="movie.cover_url"
                                             @error="onImageError" alt="">
                                    </figure>
                                </div>
                                <div class="card-content p-2">
                                    <div class="media">
                                        <div class="media-content">
                                            <p style="font-size: 0.8rem; font-weight: bold">[[ movie.title ]]</p>
                                            <p style="font-size: 0.8rem">[[ resolveDisplayDate(movie) ]]</p>
                                        </div>
                                    </div>
                                </div>

                                <div class="card-footer p-2">
                                    <template v-for="rate in [1, 2, 3, 4, 5]" :key="'star-' + movie.movieId + '-' + rate">
                                        <span :class="['fa fa-star px-1 star', getRate(movie.movieId)[1] >= rate ? 'checked': '']"
                                              @click="updateRate(movie.movieId, rate)"></span>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <footer class="modal-card-foot">
                    <button class="button is-link" :disabled="userRates.length < ratingThreshold"
                            @click="handleRatingSave">Save
                    </button>
                </footer>
            </div>
        </div>

        <footer class="footer mt-6">
            <div class="container is-max-widescreen">
                <div class="content has-text-centered">
                    <p>
                        Copyright © 2026 <a href="https://hci.comp.hkbu.edu.hk" target="_blank"><strong>PI Lab</strong></a>. All Rights Reserved.

                                                                                alt="logo"
                                                                                style="height: 30px; margin-right: 20px"></a>
                    <a href="https://hkbu.edu.hk" target="_blank"><img src="/static/img/bu-logo.png" alt="logo"
                                                                       style="height: 30px;"></a>

                </div>
            </div>
        </footer>
    </template>
</div>

<script type="module">
    import {createApp, computed, onMounted, ref} from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'

    let app = createApp({
        setup() {
            const isLoading = ref(true)
            const isActivityNavBar = ref(false)
            const uiVariant = ref({{ui_variant | tojson}})
            const algoVariant = ref({{algo_variant | tojson}})
            const ratingThreshold = ref({{rating_threshold | tojson}})
            const genreCatalog = ref({{genres | tojson}})

            const defaultGenreMovies = ref({{default_genres_movies | tojson}})
            const recommendationItems = ref({{recommendations | tojson}})
            const recommendationMessage = ref({{recommendations_message | tojson}})
            const similarItems = ref({{likes_similars | tojson}})
            const similarMessage = ref({{likes_similar_message | tojson}})
            const likedItems = ref({{likes | tojson}})
            const explainCards = ref({{explain_cards | tojson}})

            const recommendationSort = ref('score_desc')
            const similarSort = ref('similarity_desc')
            const likedSort = ref('liked_order')
            const isRefreshing = ref(false)

            const globalSearch = ref('')
            const minYearFilter = ref(1900)
            const minScoreFilter = ref(0)
            const minSimilarityFilter = ref(0)
            const activeTab = ref('recommendations')

            const showGenres = ref(false)
            const genres = ref({{user_genres | tojson}})

            const showMovieRate = ref(false)
            const userRates = ref({{user_rates | tojson}})

            const userLikes = ref({{user_likes | tojson}})

            const selectedGenreNames = computed(() => {
                const selectedIds = new Set(genres.value.map(value => value.toString()))
                return genreCatalog.value
                    .filter(item => selectedIds.has(String(item.id)))
                    .map(item => item.name)
            })

            const filteredRecommendationItems = computed(() => applyFilters(recommendationItems.value, 'recommendations'))
            const filteredSimilarItems = computed(() => applyFilters(similarItems.value, 'similar'))
            const filteredLikedItems = computed(() => applyFilters(likedItems.value, 'liked'))

            const sortedRecommendationItems = computed(() => sortMovies(filteredRecommendationItems.value, recommendationSort.value))
            const sortedSimilarItems = computed(() => sortMovies(filteredSimilarItems.value, similarSort.value))
            const sortedLikedItems = computed(() => sortMovies(filteredLikedItems.value, likedSort.value))

            // ==== Vue default operations ====
            onMounted(() => {
                isLoading.value = false

                showGenres.value = genres.value.length === 0
                showMovieRate.value = (genres.value.length > 0 && userRates.value.length < ratingThreshold.value)

                trackEvent('ui_rendered', {
                    genres_count: genres.value.length,
                    total_ratings: userRates.value.length,
                    likes_count: userLikes.value.length,
                    rating_threshold: ratingThreshold.value,
                })
            })

            function sortMovies(items, sortKey) {
                const sorted = [...(items || [])]

                const parseNumber = (value, fallback = Number.NEGATIVE_INFINITY) => {
                    const parsed = Number(value)
                    return Number.isFinite(parsed) ? parsed : fallback
                }

                if (sortKey === 'liked_order') {
                    return sorted
                }

                if (sortKey === 'title_asc') {
                    return sorted.sort((a, b) => String(a.title || '').localeCompare(String(b.title || '')))
                }

                if (sortKey === 'year_desc') {
                    return sorted.sort((a, b) => parseNumber(b.year ?? b.release_date) - parseNumber(a.year ?? a.release_date))
                }

                if (sortKey === 'score_desc') {
                    return sorted.sort((a, b) => parseNumber(b.score) - parseNumber(a.score))
                }

                if (sortKey === 'score_asc') {
                    return sorted.sort((a, b) => parseNumber(a.score, Number.POSITIVE_INFINITY) - parseNumber(b.score, Number.POSITIVE_INFINITY))
                }

                if (sortKey === 'similarity_desc') {
                    return sorted.sort((a, b) => parseNumber(b.similarity) - parseNumber(a.similarity))
                }

                if (sortKey === 'similarity_asc') {
                    return sorted.sort((a, b) => parseNumber(a.similarity, Number.POSITIVE_INFINITY) - parseNumber(b.similarity, Number.POSITIVE_INFINITY))
                }

                return sorted
            }

            function numericValue(value, fallback = Number.NaN) {
                const parsed = Number(value)
                return Number.isFinite(parsed) ? parsed : fallback
            }

            function extractYear(movie) {
                const yearCandidate = movie?.year ?? movie?.release_date
                const parsed = parseInt(yearCandidate)
                return Number.isFinite(parsed) ? parsed : null
            }

            function movieTitle(movie) {
                return String(movie?.title || '').toLowerCase()
            }

            function applyFilters(items, section) {
                const query = globalSearch.value.trim().toLowerCase()
                const minYear = Number(minYearFilter.value || 0)
                const minScore = Number(minScoreFilter.value || 0)
                const minSimilarity = Number(minSimilarityFilter.value || 0)

                return (items || []).filter(movie => {
                    if (query && !movieTitle(movie).includes(query)) {
                        return false
                    }

                    const movieYear = extractYear(movie)
                    if (Number.isFinite(minYear) && minYear > 0 && movieYear !== null && movieYear < minYear) {
                        return false
                    }

                    if (section === 'recommendations' && movie.score !== undefined && movie.score !== null) {
                        if (numericValue(movie.score, Number.NEGATIVE_INFINITY) < minScore) {
                            return false
                        }
                    }

                    if (section === 'similar' && movie.similarity !== undefined && movie.similarity !== null) {
                        if (numericValue(movie.similarity, Number.NEGATIVE_INFINITY) < minSimilarity) {
                            return false
                        }
                    }

                    return true
                })
            }

            function previewGenres(movie) {
                if (!movie || !Array.isArray(movie.genres)) {
                    return []
                }
                return movie.genres.slice(0, 3)
            }

            function cardReason(movie, section) {
                const matchedGenres = previewGenres(movie).filter(genre => selectedGenreNames.value.includes(genre))
                if (section === 'recommendations' && movie.score !== undefined && movie.score !== null) {
                    const score = Number(movie.score)
                    if (Number.isFinite(score) && score >= 4.2) {
                        return 'High predicted match score from your rating profile.'
                    }
                }

                if (section === 'similar' && movie.similarity !== undefined && movie.similarity !== null) {
                    const similarity = Number(movie.similarity)
                    if (Number.isFinite(similarity) && similarity >= 0.4) {
                        return 'Strong content similarity with your liked movies.'
                    }
                }

                if (matchedGenres.length > 0) {
                    return 'Matches your selected genres: ' + matchedGenres.join(', ')
                }

                return 'Diversity pick to broaden your watchlist.'
            }

            function resolveDisplayDate(movie) {
                if (movie && movie.year !== undefined && movie.year !== null && movie.year !== '') {
                    return movie.year
                }
                if (movie && movie.release_date !== undefined && movie.release_date !== null && movie.release_date !== '') {
                    return movie.release_date
                }
                return 'N/A'
            }

            function onImageError(event) {
                event.target.src = 'https://placehold.co/480x640?text=No+Cover'
            }

            function setListCookie(name, values) {
                document.cookie = name + '=' + values.join(',') + '; path=/'
            }

            function clearCookie(name) {
                document.cookie = name + '=; Max-Age=0; path=/'
            }

            function trackEvent(eventName, payload = {}) {
                const body = JSON.stringify({
                    event: eventName,
                    ...payload,
                })

                if (navigator.sendBeacon) {
                    const blob = new Blob([body], {type: 'application/json'})
                    navigator.sendBeacon('/event', blob)
                    return
                }

                fetch('/event', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body,
                    keepalive: true,
                })
            }

            async function refreshRecommendations() {
                if (uiVariant.value !== 'B') {
                    return
                }

                isRefreshing.value = true
                try {
                    const response = await fetch('/api/recommendations', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            user_genres: genres.value,
                            user_rates: userRates.value,
                            user_likes: userLikes.value,
                            ui_variant: uiVariant.value,
                            algo_variant: algoVariant.value,
                        }),
                    })

                    if (!response.ok) {
                        throw new Error('Failed to refresh recommendations')
                    }

                    const payload = await response.json()
                    defaultGenreMovies.value = payload.default_genres_movies || []
                    recommendationItems.value = payload.recommendations || []
                    recommendationMessage.value = payload.recommendations_message || 'No recommendations.'
                    similarItems.value = payload.likes_similars || []
                    similarMessage.value = payload.likes_similar_message || 'No similar movies found.'
                    likedItems.value = payload.likes || []
                    explainCards.value = payload.explain_cards || []
                } catch (error) {
                    console.error(error)
                } finally {
                    isRefreshing.value = false
                }
            }

            function onSortChanged(section, sortKey) {
                trackEvent('sort_changed', {
                    section,
                    sort_key: sortKey,
                })
            }

            function onFilterChanged(filterKey, filterValue) {
                trackEvent('filter_changed', {
                    filter_key: filterKey,
                    filter_value: String(filterValue),
                })
            }

            function resetFilters() {
                globalSearch.value = ''
                minYearFilter.value = 1900
                minScoreFilter.value = 0
                minSimilarityFilter.value = 0

                onFilterChanged('reset_all', 'true')
            }

            function cleanAll() {
                if (confirm("Are you sure to delete all records?")) {
                    trackEvent('clean_all', {
                        genres_count: genres.value.length,
                        total_ratings: userRates.value.length,
                        likes_count: userLikes.value.length,
                    })

                    clearCookie('user_genres')
                    clearCookie('user_rates')
                    clearCookie('user_likes')

                    genres.value = []
                    userRates.value = []
                    userLikes.value = []

                    recommendationItems.value = []
                    similarItems.value = []
                    likedItems.value = []
                    recommendationMessage.value = 'No recommendations.'
                    similarMessage.value = 'No similar movies found.'
                    explainCards.value = []
                    defaultGenreMovies.value = []

                    showGenres.value = true
                    showMovieRate.value = false

                    if (uiVariant.value !== 'B') {
                        reloadPage()
                    }
                }
            }

            function updateGenre(_id) {
                let id = _id.toString()
                const index = genres.value.indexOf(id);
                if (index > -1) {
                    genres.value.splice(index, 1);
                } else {
                    genres.value.push(id);
                    genres.value = genres.value.sort(function (a, b) {
                        return a - b;
                    });
                }
            }

            function inGenres(id) {
                return genres.value.includes(id.toString())
            }

            function saveGenres() {
                trackEvent('genres_saved', {
                    genres_count: genres.value.length,
                })

                setListCookie('user_genres', genres.value)
                clearCookie('user_rates')

                userRates.value = []
                recommendationItems.value = []
                similarItems.value = []
                likedItems.value = []
                recommendationMessage.value = 'No recommendations.'
                similarMessage.value = 'No similar movies found.'

                showGenres.value = false
                showMovieRate.value = genres.value.length > 0

                if (uiVariant.value === 'B') {
                    refreshRecommendations()
                } else {
                    reloadPage()
                }
            }

            function getRate(movieId) {
                for (let index in userRates.value) {
                    let record = userRates.value[index].split('|')
                    if (parseInt(record[1]) === movieId) {
                        return [index, parseInt(record[2])]
                    }
                }

                return [-1, -1]
            }

            function updateRate(movieId, rate) {
                let record = '611' + '|' + movieId + '|' + rate + '|' + '0'

                const index = getRate(movieId)[0];
                const isNewRating = index === -1
                if (index > -1) {
                    userRates.value[index] = record;
                } else {
                    userRates.value.push(record);
                }

                trackEvent('rating_updated', {
                    movie_id: movieId,
                    rating: rate,
                    total_ratings: userRates.value.length,
                    rating_threshold: ratingThreshold.value,
                })

                if (isNewRating && userRates.value.length === ratingThreshold.value) {
                    trackEvent('onboarding_completed', {
                        total_ratings: userRates.value.length,
                        rating_threshold: ratingThreshold.value,
                    })
                }

                setListCookie('user_rates', userRates.value)
            }

            function handleRatingSave() {
                showMovieRate.value = false

                trackEvent('rating_modal_saved', {
                    total_ratings: userRates.value.length,
                    rating_threshold: ratingThreshold.value,
                })

                if (uiVariant.value === 'B') {
                    refreshRecommendations()
                } else {
                    reloadPage()
                }
            }

            function updateLike(_movieId) {
                let movieId = _movieId.toString()
                const index = userLikes.value.indexOf(movieId);
                let liked = false
                if (index > -1) {
                    userLikes.value.splice(index, 1);
                    liked = false
                } else {
                    userLikes.value.push(movieId);
                    liked = true
                }

                trackEvent('like_toggled', {
                    movie_id: _movieId,
                    liked,
                    likes_count: userLikes.value.length,
                })

                setListCookie('user_likes', userLikes.value)

                if (uiVariant.value === 'B') {
                    refreshRecommendations()
                } else {
                    reloadPage()
                }
            }

            function inLikes(movieId) {
                return userLikes.value.includes(movieId.toString())
            }


            function reloadPage() {
                location.reload();
            }

            return {
                isLoading,
                isActivityNavBar,
                uiVariant,
                algoVariant,
                ratingThreshold,
                isRefreshing,
                cleanAll,

                showGenres,
                genres,
                updateGenre,
                inGenres,
                saveGenres,

                showMovieRate,
                userRates,
                defaultGenreMovies,
                getRate,
                updateRate,
                handleRatingSave,

                userLikes,
                updateLike,
                inLikes,

                recommendationItems,
                recommendationMessage,
                similarItems,
                similarMessage,
                likedItems,
                explainCards,
                recommendationSort,
                similarSort,
                likedSort,
                activeTab,
                globalSearch,
                minYearFilter,
                minScoreFilter,
                minSimilarityFilter,
                sortedRecommendationItems,
                sortedSimilarItems,
                sortedLikedItems,
                onSortChanged,
                onFilterChanged,
                resetFilters,
                previewGenres,
                cardReason,
                refreshRecommendations,
                resolveDisplayDate,
                onImageError,

                reloadPage,
            }
        }
    })

    // Reset the Vue delimiters and Mount it
    app.config.compilerOptions.delimiters = ['[[', ']]']
    app.mount('#app')

</script>
